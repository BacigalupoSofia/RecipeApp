<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Book</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kelly+Slab&family=League+Script&family=Playpen+Sans+Deva:wght@100..800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header>
      <div class="header-container">
        <div class="header-img">
          <img
            src="/images/recipe_logo.png"
            alt="Recipe Book Logo"
            class="logo"
          />
        </div>
        <div class="header-text">
          <h1>Recipe Notebook</h1>
          <p>Discover delicious recipes for every occasion</p>
        </div>
        <nav class="header-nav">
          <ul>
            <li><a href="/html/index.html" id="home-btn">Home</a></li>
            <li>
              <a href="/html/recipe_list.html" id="recipes-btn">Recipes</a>
            </li>
            <li>
              <a href="/html/recipe_list.html" id="fav-btn">Favorites</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="index-main">
      <div class="welcome-text">
        <h2>Welcome to the Recipe Notebook!</h2>
        <p>
          Explore a world of culinary delights and find your next favorite dish
          !
        </p>
      </div>
      <div class="back-photo-container">
        <img
          src="/images/back_photo.png"
          alt="Baking picture"
          class="back-photo"
        />
      </div>
      <div class="button-container">
        <h3>What would you like to do?</h3>
        <button class="explore button">Explore recipes 👨🏼‍🍳</button>
        <button class="add button">Add your own recipe 🍳</button>
        <button class="fav-btn">See your favorites 💜</button>
      </div>
    </main>

    <footer>
      <p>&copy; 2024 Recipe Notebook. All rights reserved.</p>
    </footer>

    <script src="/script.js"></script>
  </body>
</html>
