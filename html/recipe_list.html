<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finding Recipes</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&family=Oswald:wght@200..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header>
      <div class="header-container">
        <div class="header-img">
          <img
            src="/images/recipe_logo.png"
            alt="Recipe Book Logo"
            class="logo"
          />
        </div>
        <div class="header-text">
          <h1>Recipe Notebook</h1>
          <p>Discover delicious recipes for every occasion</p>
        </div>
        <nav class="header-nav">
          <ul>
             <li><a href="#" id="home-btn">Home</a></li>
            <li><a href="#" id="recipes-btn">Recipes</a></li>
            <li><a href="#" id="fav-btn">Favorites</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="recipe-list-page">
      
      
      <form action="" class="search-form"> 
        <h2>Find Your Next Favorite Recipe Here!</h2>
        <div class="input-button-form"> 
        <input type="text" id="search" name="search" placeholder="..." class="search-input"> 
        <button type="submit" class="search-button"> Search </button>
        </div>
      </form>
      

      <section class="recipes-grid" id="recipes-container">


</section>

 <section class="pop-up-page hidden">
      <nav class="tabs" aria-label="Main tabs">
        <button class="tab active" data-tab="recipe" type="button">
          What am I cooking today ?
        </button>
        <button class="tab" data-tab="ingredients" type="button">
          What I need ?
        </button>
        <button class="tab" data-tab="instructions" type="button">
          How to do it ?
        </button>
      </nav>

      <section class="content-card">
        <h2 id="recipe-name" class="content-title"> </h2>
        <div id="recipe" class="tab-content active">

          <div id="details_and_image">
          <div id="recipe-details">
            <p></p>
          </div>
          <div class="image_container">
            <img id="recipe-image" src=https://placehold.co/400x400 alt="Recipe Image" />
          </div>
        </div></div>

        <div id="ingredients" class="tab-content">
          <h2>Ingredients</h2>
          <ul id="ingredients-list"></ul> 
        </div>

        <div id="instructions" class="tab-content">
          <h2>Instructions</h2>
          <p id="steps"> <ol> </ol></p>
        </div>
      </section></section>

  <section class="favorite-recipes">
  </section>

  <section class="add-form"> 
    <form id="recipe-form">
      <button type="button" class="close-btn">&times;</button>
      <fieldset>
        <legend> Add you Recipe !</legend>
      

      <label for="name">Name :</label>
      <input type="text" id="name" name="name" required>

      <label for="time">Cooking Time (minutes) : </label>
      <input type="number" id="time" name="time" min="1" required>

      <div class="radio-group"> 
        <label>
          <input type="radio" name="difficulty" value="Easy">
            Easy
          </label>

         <label>
           <input type="radio" name="difficulty" value="Medium">
             Medium
          </label>

        <label>
         <input type="radio" name="difficulty" value="Hard">
           Hard
        </label>
      </div>

<label for="img">Image:</label>
<input
  type="file"
  id="img"
  name="img"
  accept="image/*">

<label for="resume">Resume : </label>
<textarea id="resume" name="resume"></textarea>

<label for="ingredients">Ingredients : </label>
<textarea id="ingredients" name="ingredients" placeholder="One ingredient per line"></textarea>

<label for="instructions">Instructions : </label>
<textarea id="instructions" name="instructions" placeholder="Step 1...
Step 2...
Step 3..."></textarea>


<button type="submit" class="add-recipe-btn"> Add </button>
</fieldset>
 </form>

  </section>

    </main>
    <footer>
      <p>&copy; 2024 Recipe Notebook. All rights reserved.</p>
    </footer>

    <script src="/script.js"></script>
  </body>
</html>
